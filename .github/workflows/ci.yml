name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The cross-tenant RLS isolation test (a required gate) needs a real Postgres.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aegis
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Schema must exist before the RLS test applies policies on top of it.
      - name: Apply migrations
        run: pnpm --filter @aegis/db exec prisma migrate deploy

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test # includes the cross-tenant RLS isolation gate (@aegis/db)
      - name: Build libraries + api
        run: pnpm exec turbo run build --filter='!web'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # --redact so a hit is never echoed into the public log; non-zero exit fails the job.
          ./gitleaks detect --source . --no-banner --redact
